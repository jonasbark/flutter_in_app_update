name: in_app_update_plus
description: Checks for app updates on Android and iOS using Play Core and App Store lookup.
version: 1.0.0
homepage: https://pub.dev/packages/in_app_update_plus

environment:
  sdk: '>=2.17.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: de.ffuf.in_app_update_plus
        pluginClass: InAppUpdatePlugin
      ios:
        pluginClass: InAppUpdatePlugin
